<style>
  :root {
    --teal: #0E5A6A; --teal-dark: #083B46; --teal-deep: #052730;
    --charcoal: #1B1F24; --ink: #0F172A; --body: #2E3A44; --muted: #64748B;
    --line: #E2E8F0; --panel: #F5F7F8; --brass: #B08B45; --brass-soft: #D9BE89;
    --brass-glow: #E6D1A0; --tri-saffron: #FF9933; --tri-green: #138808;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Inter", system-ui, sans-serif;
    color: var(--white);
    background:
      radial-gradient(1100px 520px at 88% -10%, rgba(176,139,69,0.12), transparent 62%),
      linear-gradient(180deg, var(--teal-deep) 0%, var(--teal-dark) 55%, var(--teal) 100%);
    min-height: 100vh;
    display: flex; flex-direction: column;
    position: relative;
    padding-top: 0;}
  body::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 3px;
    background: linear-gradient(90deg,
      var(--tri-saffron) 0%, var(--tri-saffron) 33.33%,
      #FFFFFF 33.33%, #FFFFFF 66.66%,
      var(--tri-green) 66.66%, var(--tri-green) 100%);
    opacity: .9;
  }
  .wrap {
    max-width: 720px;
    margin: auto;
    padding: 80px clamp(20px, 4vw, 48px);
    text-align: center;
  }
  .eyebrow {
    font-weight: 600; font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--brass-glow);
    margin-bottom: 18px;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow::before, .eyebrow::after {
    content: ""; width: 28px; height: 1px; background: var(--brass-soft);
  }
  h1 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-size: clamp(40px, 6vw, 72px);
    line-height: 1.05;
    margin: 0 0 16px;
  }
  h1 em { font-style: italic; color: var(--brass-glow); font-weight: 500; }
  p {
    font-size: clamp(15px, 1.6vw, 17px);
    color: rgba(255,255,255,0.80);
    max-width: 48ch;
    margin: 0 auto 28px;
    line-height: 1.6;
  }
  .cta { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn {
    font-family: "Inter", sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 13px 22px;
    border-radius: 8px;
    letter-spacing: 0.02em;
    text-decoration: none;
    transition: transform .12s ease, background .15s ease, border-color .15s ease;
  }
  .btn-primary {
    background: var(--brass);
    color: #1B1409;
    border: 1px solid var(--brass);
  }
  .btn-primary:hover { background: var(--brass-glow); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.35);
  }
  .btn-ghost:hover { border-color: var(--brass-glow); color: var(--brass-glow); }

  .hero-glows { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .glow-1 { position: absolute; background: radial-gradient(circle, rgba(14, 90, 106, 0.4) 0%, transparent 70%); width: 60vw; height: 60vw; top: -20vw; right: -10vw; filter: blur(100px); opacity: 0.4; }
  .glow-2 { position: absolute; background: radial-gradient(circle, rgba(176, 139, 69, 0.15) 0%, transparent 70%); width: 50vw; height: 50vw; bottom: -15vw; left: -5vw; filter: blur(100px); opacity: 0.3; }

  .eyebrow {
    display: inline-flex !important; align-items: center !important; gap: 10px !important;
    padding: 6px 16px !important; border-radius: 30px !important; font-size: 13px !important;
    font-family: "Inter", sans-serif !important; font-weight: 600 !important; letter-spacing: 0.15em !important;
    background: rgba(230, 209, 160, 0.08) !important; border: 1px solid rgba(230, 209, 160, 0.25) !important;
    color: var(--brass-glow) !important; margin-bottom: 24px !important; backdrop-filter: blur(4px) !important;
    text-transform: uppercase !important; position: relative !important; z-index: 5 !important;
  }
  .eyebrow::before {
    content: "" !important; width: 8px !important; height: 8px !important; border-radius: 50% !important;
    background: var(--brass-glow) !important; display: inline-block !important;
    box-shadow: 0 0 10px var(--brass-glow) !important; animation: pulseDot 1.5s infinite !important;
    margin-right: 0 !important;
  }
  .eyebrow::after { content: none !important; }
  @keyframes pulseDot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }

margin-top: -68px; padding-top: 80px; .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  /* â”€â”€ Transparent nav: scrolled state â”€â”€ */
  .site-nav.scrolled {
    background: rgba(255,255,255,0.96);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .site-nav.scrolled .nav-brand { color: var(--teal-dark); }
  .site-nav.scrolled .nav-links a { color: var(--body); }
  .site-nav.scrolled .nav-links a:hover { color: var(--teal-dark); }
  .site-nav.scrolled .nav-links a.is-active { color: var(--teal-dark); }
  .site-nav.scrolled .nav-toggle {
    border: 1px solid var(--line);
    background: var(--white);
    color: var(--teal-dark);
  }
  
  /* -- Slow-breathing hero glows -- */
  @keyframes glowPulse1 {
    0%, 100% { opacity: 0.30; transform: scale(1);    }
    50%       { opacity: 0.55; transform: scale(1.06); }
  }
  @keyframes glowPulse2 {
    0%, 100% { opacity: 0.18; transform: scale(1);    }
    50%       { opacity: 0.38; transform: scale(1.09); }
  }
  .glow-1 { animation: glowPulse1  9s ease-in-out infinite; }
  .glow-2 { animation: glowPulse2 13s ease-in-out infinite 2s; }

  /* -- Hero dot-grid texture -- */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: 0;
    pointer-events: none;
  }
  .hero > .wrap { position: relative; z-index: 2; }

  /* ====== Hero Premium Animation ====== */
  @keyframes heroSweep {
    0%         { transform: translateX(-100%) skewX(-12deg); opacity: 0; }
    8%         { opacity: 1; }
    92%        { opacity: 1; }
    100%       { transform: translateX(500%); skewX(-12deg); opacity: 0; }
  }
  @keyframes bracketPulse {
    0%, 100%   { opacity: 0.12; }
    50%        { opacity: 0.45; }
  }
  @keyframes dotBlink {
    0%, 100%   { opacity: 0.0; }
    50%        { opacity: 0.7; }
  }

  /* Light sweep beams */
  .hero-fx {
    position: absolute; inset: 0;
    overflow: hidden; pointer-events: none; z-index: 1;
  }
  .hero-fx::before {
    content: '';
    position: absolute; top: -100%; left: -25%;
    width: 22%; height: 300%;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255,255,255,0.014) 30%,
      rgba(255,255,255,0.032) 50%,
      rgba(255,255,255,0.014) 70%,
      transparent 100%
    );
    animation: heroSweep 20s ease-in-out infinite;
  }
  .hero-fx::after {
    content: '';
    position: absolute; top: -100%; left: -25%;
    width: 14%; height: 300%;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(176,139,69,0.03) 50%,
      transparent 100%
    );
    animation: heroSweep 20s ease-in-out infinite 10s;
  }

  /* Precision corner brackets */
  .hero-brackets {
    position: absolute; inset: 28px;
    pointer-events: none; z-index: 2;
  }
  .hero-brackets span {
    position: absolute;
    width: 20px; height: 20px;
    border-color: rgba(230,209,160,0.35);
    border-style: solid;
    animation: bracketPulse 7s ease-in-out infinite;
  }
  .hero-brackets span:nth-child(1) { top:0; left:0;  border-width: 1px 0 0 1px; }
  .hero-brackets span:nth-child(2) { top:0; right:0; border-width: 1px 1px 0 0; animation-delay: 1.75s; }
  .hero-brackets span:nth-child(3) { bottom:0; left:0;  border-width: 0 0 1px 1px; animation-delay: 3.5s; }
  .hero-brackets span:nth-child(4) { bottom:0; right:0; border-width: 0 1px 1px 0; animation-delay: 5.25s; }

  /* Small precision dots at bracket corners */
  .hero-brackets span::before {
    content: '';
    position: absolute; width: 3px; height: 3px;
    background: rgba(230,209,160,0.6);
    border-radius: 50%;
    animation: dotBlink 7s ease-in-out infinite;
  }
  .hero-brackets span:nth-child(1)::before { top:-1px; left:-1px; }
  .hero-brackets span:nth-child(2)::before { top:-1px; right:-1px; animation-delay: 1.75s; }
  .hero-brackets span:nth-child(3)::before { bottom:-1px; left:-1px; animation-delay: 3.5s; }
  .hero-brackets span:nth-child(4)::before { bottom:-1px; right:-1px; animation-delay: 5.25s; }
</style>
</head>
<body>
<header class="hero">
    <div class="hero-glows"><div class="glow-1"></div><div class="glow-2"></div></div><div class="hero-fx" aria-hidden="true"></div><div class="hero-brackets" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
    <div class="wrap">
      <div class="eyebrow">404</div>
      <h1>This page isn&rsquo;t <em>here.</em></h1>
      <p>The link may be outdated, or the page has moved. Use the links below to get back on track.</p>
      <div class="cta">
        <a class="btn btn-primary" href="/">Return home</a>
        <a class="btn btn-ghost" href="/contact">Contact us</a>
      </div>
    </div>
</header>

<script>
(function(){
  var nav     = document.querySelector('.site-nav');
  var logoImg = document.querySelector('.nav-brand img');
  var whiteSrc = 'https://i.ibb.co/WpnqXhP0/techadyant-logo-03.png';
  var darkSrc  = 'https://i.ibb.co/hJKKd4w8/techadyant-logo-3.png';
  function update() {
    if (window.scrollY > 60) {
      nav.classList.add('scrolled');
      if (logoImg) logoImg.src = darkSrc;
    } else {
      nav.classList.remove('scrolled');
      if (logoImg) logoImg.src = whiteSrc;
    }
  }
  window.addEventListener('scroll', update, {passive:true});
  update();
})();
</script>
</body>
