<style>

  body {

  h1 {

  .cta { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn {
    font-family: "Inter", sans-serif;

  .glow-2 { position: absolute; background: radial-gradient(circle, rgba(176, 139, 69, 0.15) 0%, transparent 70%); width: 50vw; height: 50vw; bottom: -15vw; left: -5vw; filter: blur(100px); opacity: 0.3; }

  .eyebrow {

margin-top: -68px; padding-top: 80px; .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  /* â”€â”€ Transparent nav: scrolled state â”€â”€ */
  .site-nav.scrolled {
    background: rgba(255,255,255,0.96);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .site-nav.scrolled .nav-brand { color: var(--teal-dark); }
  .site-nav.scrolled .nav-links a { color: var(--body); }
  .site-nav.scrolled .nav-links a:hover { color: var(--teal-dark); }
  .site-nav.scrolled .nav-links a.is-active { color: var(--teal-dark); }
  .site-nav.scrolled .nav-toggle {
    border: 1px solid var(--line);
    background: var(--white);
    color: var(--teal-dark);
  }
  
  /* -- Slow-breathing hero glows -- */
  @keyframes glowPulse1 {
    0%, 100% { opacity: 0.30; transform: scale(1);    }
    50%       { opacity: 0.55; transform: scale(1.06); }
  }
  @keyframes glowPulse2 {
    0%, 100% { opacity: 0.18; transform: scale(1);    }
    50%       { opacity: 0.38; transform: scale(1.09); }
  }
  .glow-1 { animation: glowPulse1  9s ease-in-out infinite; }
  .glow-2 { animation: glowPulse2 13s ease-in-out infinite 2s; }

  /* -- Hero dot-grid texture -- */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: 0;
    pointer-events: none;
  }
  .hero > .wrap { position: relative; z-index: 2; }

  /* ====== Modern Tactical Radar Display ====== */
  @keyframes radarSweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes radarPing {
    0%   { transform: translate(-50%,-50%) scale(0.06); opacity: 0.9; }
    100% { transform: translate(-50%,-50%) scale(1.04); opacity: 0; }
  }
  @keyframes radarBlink {
    0%, 100% { opacity: 0.12; box-shadow: 0 0 4px rgba(230,180,60,0.2); }
    50%       { opacity: 1;    box-shadow: 0 0 14px rgba(230,180,60,0.75), 0 0 5px rgba(255,220,100,0.5); }
  }
  @keyframes ringPulse  { 0%, 100% { opacity: 0.13; } 50% { opacity: 0.30; } }
  @keyframes hudBlink   { 0%, 88%, 100% { opacity: 1; } 93% { opacity: 0.25; } }

  /* Radar container â€” right side of hero, fully inside overflow boundary */
  .hero-radar {
    position: absolute;
    right: 2%;
    top: 50%; transform: translateY(-50%);
    width: clamp(260px, 32vw, 440px);
    aspect-ratio: 1 / 1;
    pointer-events: none; z-index: 1;
  }

  /* Dark CRT screen background */
  .radar-screen-bg {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 42% 38%,
      rgba(0,40,32,0.78) 0%,
      rgba(0,22,17,0.88) 55%,
      rgba(0,10,8,0.95) 100%
    );
    box-shadow: inset 0 0 50px rgba(0,0,0,0.6),
                inset 0 0 120px rgba(0,30,24,0.4);
  }
  /* CRT scanlines */
  .radar-screen-bg::after {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
    );
  }

  /* Tick marks around perimeter */
  .radar-tick-wrap { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; }
  .radar-tick {
    position: absolute;
    top: 0; left: calc(50% - 0.5px);
    width: 1px; height: 50%;
    transform-origin: bottom center;
  }
  .radar-tick::after {
    content: '';
    position: absolute; top: 3px; left: 0;
    width: 1px; height: 5px;
    background: rgba(0,220,190,0.35);
  }
  .radar-tick.major::after {
    height: 10px;
    width: 1.5px; left: -0.25px;
    background: rgba(0,230,200,0.60);
  }

  /* Compass labels */
  .radar-compass { position: absolute; inset: 0; }
  .radar-compass span {
    position: absolute;
    font-family: 'Inter', 'Courier New', monospace;
    font-size: clamp(7px, 0.65vw, 9px); font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(0,225,195,0.60);
  }
  .rN { top: 15%; left: 50%; transform: translateX(-50%); }
  .rE { right: 15%; top: 50%; transform: translateY(-50%); }
  .rS { bottom: 15%; left: 50%; transform: translateX(-50%); }
  .rW { left: 15%; top: 50%; transform: translateY(-50%); }

  /* Clipping circle â€” grid, sweep, cross stay inside */
  .radar-body { position: absolute; inset: 5%; border-radius: 50%; overflow: hidden; }
  .radar-body::before {
    content: '';
    position: absolute; inset: -32px;
    background-image:
      linear-gradient(rgba(0,205,180,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,205,180,0.07) 1px, transparent 1px);
    background-size: 38px 38px;
  }

  /* Sweep: conic gradient glow trail + rotating arm */
  .radar-sweep {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      transparent 0deg, transparent 265deg,
      rgba(0,220,190,0.02) 290deg,
      rgba(0,220,190,0.09) 330deg,
      rgba(0,235,205,0.20) 358deg,
      transparent 360deg
    );
    animation: radarSweep 6s linear infinite;
  }
  .radar-arm {
    position: absolute; top: 50%; left: 50%;
    width: 50%; height: 1px;
    transform-origin: left center;
    background: linear-gradient(90deg,
      rgba(0,255,225,0.90) 0%,
      rgba(0,255,225,0.45) 35%,
      transparent 100%);
    filter: blur(0.4px);
    animation: radarSweep 6s linear infinite;
  }

  /* Crosshair */
  .radar-cross { position: absolute; inset: 0; }
  .radar-cross::before {
    content: '';
    position: absolute; top: 50%; left: 6%; right: 6%; height: 1px;
    background: rgba(0,205,180,0.14); transform: translateY(-50%);
  }
  .radar-cross::after {
    content: '';
    position: absolute; left: 50%; top: 6%; bottom: 6%; width: 1px;
    background: rgba(0,205,180,0.14); transform: translateX(-50%);
  }

  /* 4 concentric rings */
  .radar-rings { position: absolute; inset: 5%; }
  .radar-rings span {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(0,205,180,0.22);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    animation: ringPulse 5s ease-in-out infinite;
  }
  .radar-rings span:nth-child(1) { width: 25%; height: 25%; }
  .radar-rings span:nth-child(2) { width: 50%; height: 50%; animation-delay: 0.9s; }
  .radar-rings span:nth-child(3) { width: 75%; height: 75%; animation-delay: 1.8s; }
  .radar-rings span:nth-child(4) { width: 98%; height: 98%; animation-delay: 2.7s; border-color: rgba(0,205,180,0.28); }

  /* Expanding ping rings from centre */
  .radar-pings { position: absolute; inset: 5%; }
  .radar-pings .radar-ping {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(0,245,215,0.42);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.06);
    width: 86%; height: 86%;
    animation: radarPing 5.5s ease-out infinite;
  }
  .radar-pings .radar-ping + .radar-ping { animation-delay: 2.75s; }

  /* Centre reticle dot */
  .radar-center {
    position: absolute; width: 8px; height: 8px; border-radius: 50%;
    background: rgba(0,255,225,1);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    box-shadow: 0 0 18px rgba(0,255,225,0.85), 0 0 6px rgba(0,255,225,1), 0 0 36px rgba(0,255,225,0.25);
  }
  .radar-center::before, .radar-center::after {
    content: '';
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(0,255,225,0.40);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
  }
  .radar-center::before { width: 18px; height: 18px; }
  .radar-center::after  { width: 30px; height: 30px; border-color: rgba(0,255,225,0.18); }

  /* Brass contact blips */
  .radar-blips { position: absolute; inset: 5%; }
  .radar-blips div {
    position: absolute;
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(235,185,55,0.95);
    box-shadow: 0 0 10px rgba(235,185,55,0.55);
    animation: radarBlink 3.5s ease-in-out infinite;
  }
  .radar-blips div:nth-child(1) { top: 25%; left: 65%; animation-delay: 0.3s; }
  .radar-blips div:nth-child(2) { top: 63%; left: 34%; animation-delay: 1.7s; }
  .radar-blips div:nth-child(3) { top: 75%; left: 67%; animation-delay: 2.6s; }
  .radar-blips div:nth-child(4) { top: 37%; left: 74%; animation-delay: 0.9s; }

  /* HUD corner data overlays */
  .radar-hud { position: absolute; inset: 0; }
  .rhud {
    position: absolute;
    font-family: 'Inter', 'Courier New', monospace;
    font-size: clamp(6px, 0.58vw, 8px);
    font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; line-height: 1.6;
    color: rgba(0,200,178,0.40);
  }
  .rhud span { display: block; }
  .rhud strong {
    display: block;
    font-size: clamp(8px, 0.72vw, 10px); font-weight: 700;
    color: rgba(0,235,205,0.82);
    animation: hudBlink 7s ease-in-out infinite;
  }
  .rhud-tl { top: 9%;    left: 9%; }
  .rhud-tr { top: 9%;    right: 9%; text-align: right; }
  .rhud-bl { bottom: 9%; left: 9%; }
  .rhud-br { bottom: 9%; right: 9%; text-align: right; }
  .rhud-tr strong { animation-delay: 1.75s; }
  .rhud-bl strong { animation-delay: 3.5s; }
  .rhud-br strong { animation-delay: 5.25s; }

  /* Outer decorative frame rings */
  .radar-frame {
    position: absolute; inset: -3px; border-radius: 50%;
    border: 1px solid rgba(0,205,180,0.32);
    box-shadow: 0 0 24px rgba(0,205,180,0.10), inset 0 0 24px rgba(0,205,180,0.06);
  }
  .radar-frame::before {
    content: '';
    position: absolute; inset: -6px; border-radius: 50%;
    border: 1px solid rgba(0,205,180,0.10);
  }
  .radar-frame::after {
    content: '';
    position: absolute; inset: 4px; border-radius: 50%;
    border: 1px solid rgba(0,205,180,0.08);
  }

  /* Responsive */
  @media (max-width: 1100px) { .hero-radar { width: clamp(220px, 30vw, 380px); } }
  @media (max-width: 860px)  { .hero-radar { width: 240px; right: -50px; opacity: 0.40; } }
  @media (max-width: 640px)  { .hero-radar { display: none; } }
</style>
</head>

<script>
(function(){
  var nav     = document.querySelector('.site-nav');
  var logoImg = document.querySelector('.nav-brand img');
  var whiteSrc = 'https://i.ibb.co/WpnqXhP0/techadyant-logo-03.png';
  var darkSrc  = 'https://i.ibb.co/hJKKd4w8/techadyant-logo-3.png';
  function update() {
    if (window.scrollY > 60) {
      nav.classList.add('scrolled');
      if (logoImg) logoImg.src = darkSrc;
    } else {
      nav.classList.remove('scrolled');
      if (logoImg) logoImg.src = whiteSrc;
    }
  }
  window.addEventListener('scroll', update, {passive:true});
  update();
})();
</script>
