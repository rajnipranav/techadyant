<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Page not found &mdash; TechPavitra</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="https://i.ibb.co/qLg4QyNL/favicon.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/qLg4QyNL/favicon.png">
<link rel="shortcut icon" href="https://i.ibb.co/qLg4QyNL/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #0E5A6A; --teal-dark: #083B46; --teal-deep: #052730;
    --charcoal: #1B1F24; --ink: #0F172A; --body: #2E3A44; --muted: #64748B;
    --line: #E2E8F0; --panel: #F5F7F8; --brass: #B08B45; --brass-soft: #D9BE89;
    --brass-glow: #E6D1A0; --tri-saffron: #FF9933; --tri-green: #138808;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Inter", system-ui, sans-serif;
    color: var(--white);
    background:
      radial-gradient(1100px 520px at 88% -10%, rgba(176,139,69,0.12), transparent 62%),
      linear-gradient(180deg, var(--teal-deep) 0%, var(--teal-dark) 55%, var(--teal) 100%);
    min-height: 100vh;
    display: flex; flex-direction: column;
    position: relative;
  }
  body::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 3px;
    background: linear-gradient(90deg,
      var(--tri-saffron) 0%, var(--tri-saffron) 33.33%,
      #FFFFFF 33.33%, #FFFFFF 66.66%,
      var(--tri-green) 66.66%, var(--tri-green) 100%);
    opacity: .9;
  }
  .wrap {
    max-width: 720px;
    margin: auto;
    padding: 80px clamp(20px, 4vw, 48px);
    text-align: center;
  }
  .eyebrow {
    font-weight: 600; font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--brass-glow);
    margin-bottom: 18px;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow::before, .eyebrow::after {
    content: ""; width: 28px; height: 1px; background: var(--brass-soft);
  }
  h1 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-size: clamp(40px, 6vw, 72px);
    line-height: 1.05;
    margin: 0 0 16px;
  }
  h1 em { font-style: italic; color: var(--brass-glow); font-weight: 500; }
  p {
    font-size: clamp(15px, 1.6vw, 17px);
    color: rgba(255,255,255,0.80);
    max-width: 48ch;
    margin: 0 auto 28px;
    line-height: 1.6;
  }
  .cta { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn {
    font-family: "Inter", sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 13px 22px;
    border-radius: 8px;
    letter-spacing: 0.02em;
    text-decoration: none;
    transition: transform .12s ease, background .15s ease, border-color .15s ease;
  }
  .btn-primary {
    background: var(--brass);
    color: #1B1409;
    border: 1px solid var(--brass);
  }
  .btn-primary:hover { background: var(--brass-glow); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.35);
  }
  .btn-ghost:hover { border-color: var(--brass-glow); color: var(--brass-glow); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">404</div>
    <h1>This page isn&rsquo;t <em>here.</em></h1>
    <p>The link may be outdated, or the page has moved. Use the links below to get back on track.</p>
    <div class="cta">
      <a class="btn btn-primary" href="/">Return home</a>
      <a class="btn btn-ghost" href="/contact">Contact us</a>
    </div>
  </div>
</body>
</html>
