<style>
  :root {
    --teal: #0E5A6A; --teal-dark: #083B46; --teal-deep: #052730;
    --charcoal: #1B1F24; --ink: #0F172A; --body: #2E3A44; --muted: #64748B;
    --line: #E2E8F0; --panel: #F5F7F8; --brass: #B08B45; --brass-soft: #D9BE89;
    --brass-glow: #E6D1A0; --tri-saffron: #FF9933; --tri-green: #138808;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Inter", system-ui, sans-serif;
    color: var(--white);
    background:
      radial-gradient(1100px 520px at 88% -10%, rgba(176,139,69,0.12), transparent 62%),
      linear-gradient(180deg, var(--teal-deep) 0%, var(--teal-dark) 55%, var(--teal) 100%);
    min-height: 100vh;
    display: flex; flex-direction: column;
    position: relative;
    padding-top: 0;}
  body::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 3px;
    background: linear-gradient(90deg,
      var(--tri-saffron) 0%, var(--tri-saffron) 33.33%,
      #FFFFFF 33.33%, #FFFFFF 66.66%,
      var(--tri-green) 66.66%, var(--tri-green) 100%);
    opacity: .9;
  }
  .wrap {
    max-width: 720px;
    margin: auto;
    padding: 80px clamp(20px, 4vw, 48px);
    text-align: center;
  }
  .eyebrow {
    font-weight: 600; font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--brass-glow);
    margin-bottom: 18px;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow::before, .eyebrow::after {
    content: ""; width: 28px; height: 1px; background: var(--brass-soft);
  }
  h1 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-size: clamp(40px, 6vw, 72px);
    line-height: 1.05;
    margin: 0 0 16px;
  }
  h1 em { font-style: italic; color: var(--brass-glow); font-weight: 500; }
  p {
    font-size: clamp(15px, 1.6vw, 17px);
    color: rgba(255,255,255,0.80);
    max-width: 48ch;
    margin: 0 auto 28px;
    line-height: 1.6;
  }
  .cta { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn {
    font-family: "Inter", sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 13px 22px;
    border-radius: 8px;
    letter-spacing: 0.02em;
    text-decoration: none;
    transition: transform .12s ease, background .15s ease, border-color .15s ease;
  }
  .btn-primary {
    background: var(--brass);
    color: #1B1409;
    border: 1px solid var(--brass);
  }
  .btn-primary:hover { background: var(--brass-glow); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.35);
  }
  .btn-ghost:hover { border-color: var(--brass-glow); color: var(--brass-glow); }

  .hero-glows { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .glow-1 { position: absolute; background: radial-gradient(circle, rgba(14, 90, 106, 0.4) 0%, transparent 70%); width: 60vw; height: 60vw; top: -20vw; right: -10vw; filter: blur(100px); opacity: 0.4; }
  .glow-2 { position: absolute; background: radial-gradient(circle, rgba(176, 139, 69, 0.15) 0%, transparent 70%); width: 50vw; height: 50vw; bottom: -15vw; left: -5vw; filter: blur(100px); opacity: 0.3; }

  .eyebrow {
    display: inline-flex !important; align-items: center !important; gap: 10px !important;
    padding: 6px 16px !important; border-radius: 30px !important; font-size: 13px !important;
    font-family: "Inter", sans-serif !important; font-weight: 600 !important; letter-spacing: 0.15em !important;
    background: rgba(230, 209, 160, 0.08) !important; border: 1px solid rgba(230, 209, 160, 0.25) !important;
    color: var(--brass-glow) !important; margin-bottom: 24px !important; backdrop-filter: blur(4px) !important;
    text-transform: uppercase !important; position: relative !important; z-index: 5 !important;
  }
  .eyebrow::before {
    content: "" !important; width: 8px !important; height: 8px !important; border-radius: 50% !important;
    background: var(--brass-glow) !important; display: inline-block !important;
    box-shadow: 0 0 10px var(--brass-glow) !important; animation: pulseDot 1.5s infinite !important;
    margin-right: 0 !important;
  }
  .eyebrow::after { content: none !important; }
  @keyframes pulseDot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }

margin-top: -68px; padding-top: 80px; .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  /* â”€â”€ Transparent nav: scrolled state â”€â”€ */
  .site-nav.scrolled {
    background: rgba(255,255,255,0.96);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .site-nav.scrolled .nav-brand { color: var(--teal-dark); }
  .site-nav.scrolled .nav-links a { color: var(--body); }
  .site-nav.scrolled .nav-links a:hover { color: var(--teal-dark); }
  .site-nav.scrolled .nav-links a.is-active { color: var(--teal-dark); }
  .site-nav.scrolled .nav-toggle {
    border: 1px solid var(--line);
    background: var(--white);
    color: var(--teal-dark);
  }
  
  /* -- Slow-breathing hero glows -- */
  @keyframes glowPulse1 {
    0%, 100% { opacity: 0.30; transform: scale(1);    }
    50%       { opacity: 0.55; transform: scale(1.06); }
  }
  @keyframes glowPulse2 {
    0%, 100% { opacity: 0.18; transform: scale(1);    }
    50%       { opacity: 0.38; transform: scale(1.09); }
  }
  .glow-1 { animation: glowPulse1  9s ease-in-out infinite; }
  .glow-2 { animation: glowPulse2 13s ease-in-out infinite 2s; }

  /* -- Hero dot-grid texture -- */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: 0;
    pointer-events: none;
  }
  .hero > .wrap { position: relative; z-index: 2; }

  /* ====== Tactical Radar Display ====== */
  @keyframes radarSweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes radarPing {
    0%   { transform: translate(-50%,-50%) scale(0.1); opacity: 0.7; }
    100% { transform: translate(-50%,-50%) scale(1.0); opacity: 0; }
  }
  @keyframes radarBlink { 0%, 100% { opacity: 0.18; } 50% { opacity: 0.88; } }
  @keyframes ringPulse  { 0%, 100% { opacity: 0.12; } 50% { opacity: 0.32; } }

  /* Radar container â€” right half of hero, vertically centred */
  .hero-radar {
    position: absolute;
    right: clamp(-130px, -9vw, -50px);
    top: 50%; transform: translateY(-50%);
    width: clamp(300px, 40vw, 520px);
    aspect-ratio: 1 / 1;
    pointer-events: none; z-index: 1;
  }

  /* Outer boundary ring */
  .radar-outer {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(14,180,160,0.28);
    animation: ringPulse 5s ease-in-out infinite;
  }
  /* Second outer tick ring */
  .radar-outer::after {
    content: '';
    position: absolute; inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(14,180,160,0.10);
  }

  /* Clipping circle â€” grid + sweep stay inside */
  .radar-body {
    position: absolute; inset: 0;
    border-radius: 50%; overflow: hidden;
  }
  /* Grid texture */
  .radar-body::before {
    content: '';
    position: absolute; inset: -32px;
    background-image:
      linear-gradient(rgba(0,210,190,0.09) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,210,190,0.09) 1px, transparent 1px);
    background-size: 46px 46px;
  }

  /* Sweep â€” conic gradient glow trail */
  .radar-sweep {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      transparent 275deg,
      rgba(0,210,190,0.03) 305deg,
      rgba(0,210,190,0.14) 355deg,
      transparent 360deg
    );
    animation: radarSweep 7s linear infinite;
  }
  /* Sweep arm line */
  .radar-arm {
    position: absolute; top: 50%; left: 50%;
    width: 50%; height: 1px;
    transform-origin: left center;
    background: linear-gradient(90deg, rgba(0,230,210,0.65), transparent);
    animation: radarSweep 7s linear infinite;
  }

  /* Crosshair */
  .radar-cross { position: absolute; inset: 0; }
  .radar-cross::before {
    content: '';
    position: absolute; top: 50%; left: 8%; right: 8%; height: 1px;
    background: rgba(0,210,190,0.13); transform: translateY(-50%);
  }
  .radar-cross::after {
    content: '';
    position: absolute; left: 50%; top: 8%; bottom: 8%; width: 1px;
    background: rgba(0,210,190,0.13); transform: translateX(-50%);
  }

  /* Concentric rings */
  .radar-rings { position: absolute; inset: 0; }
  .radar-rings span {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(14,180,160,0.22);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    animation: ringPulse 5s ease-in-out infinite;
  }
  .radar-rings span:nth-child(1) { width: 26%; height: 26%; }
  .radar-rings span:nth-child(2) { width: 52%; height: 52%; animation-delay: 0.9s; }
  .radar-rings span:nth-child(3) { width: 78%; height: 78%; animation-delay: 1.8s; }

  /* Expanding ping rings from center */
  .radar-pings { position: absolute; inset: 0; }
  .radar-pings .radar-ping {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(0,230,210,0.38);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.1);
    width: 82%; height: 82%;
    animation: radarPing 5.5s ease-out infinite;
  }
  .radar-pings .radar-ping + .radar-ping { animation-delay: 2.75s; }

  /* Center reticle dot */
  .radar-center {
    position: absolute; width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(0,230,210,0.9);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 14px rgba(0,230,210,0.55), 0 0 4px rgba(0,230,210,0.9);
  }

  /* Brass blip targets */
  .radar-blips { position: absolute; inset: 0; }
  .radar-blips div {
    position: absolute;
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(176,139,69,0.92);
    box-shadow: 0 0 9px rgba(176,139,69,0.55);
    animation: radarBlink 3.2s ease-in-out infinite;
  }
  .radar-blips div:nth-child(1) { top: 27%; left: 63%; animation-delay: 0.3s; }
  .radar-blips div:nth-child(2) { top: 61%; left: 36%; animation-delay: 1.5s; }
  .radar-blips div:nth-child(3) { top: 75%; left: 66%; animation-delay: 2.4s; }

  /* Responsive â€” fade out toward edge on tablet, hide on mobile */
  @media (max-width: 860px) {
    .hero-radar { opacity: 0.4; right: -160px; width: 270px; }
  }
  @media (max-width: 640px) { .hero-radar { display: none; } }
</style>

<body>
<header class="hero">
    <div class="hero-glows"><div class="glow-1"></div><div class="glow-2"></div></div><div class="hero-radar" aria-hidden="true"><div class="radar-outer"></div><div class="radar-body"><div class="radar-sweep"></div><div class="radar-arm"></div><div class="radar-cross"></div></div><div class="radar-rings"><span></span><span></span><span></span></div><div class="radar-pings"><div class="radar-ping"></div><div class="radar-ping"></div></div><div class="radar-center"></div><div class="radar-blips"><div></div><div></div><div></div></div></div>
    <div class="wrap">
      <div class="eyebrow">404</div>
      <h1>This page isn&rsquo;t <em>here.</em></h1>
      <p>The link may be outdated, or the page has moved. Use the links below to get back on track.</p>
      <div class="cta">
        <a class="btn btn-primary" href="/">Return home</a>
        <a class="btn btn-ghost" href="/contact">Contact us</a>
      </div>
    </div>
</header>

<script>
(function(){
  var nav     = document.querySelector('.site-nav');
  var logoImg = document.querySelector('.nav-brand img');
  var whiteSrc = 'https://i.ibb.co/WpnqXhP0/techadyant-logo-03.png';
  var darkSrc  = 'https://i.ibb.co/hJKKd4w8/techadyant-logo-3.png';
  function update() {
    if (window.scrollY > 60) {
      nav.classList.add('scrolled');
      if (logoImg) logoImg.src = darkSrc;
    } else {
      nav.classList.remove('scrolled');
      if (logoImg) logoImg.src = whiteSrc;
    }
  }
  window.addEventListener('scroll', update, {passive:true});
  update();
})();
</script>
</body>
